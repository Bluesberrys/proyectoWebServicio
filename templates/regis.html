<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliTutor UNAM</title>
    <link rel="icon" href="{{ url_for('static', filename='img/Escudo-UNAM-white.svg') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&family=Josefin+Slab:wght@100..700&display=swap"
      rel="stylesheet" />
    <script src="https://kit.fontawesome.com/71a7ab61a9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>

  <body>
    <header>
      <div class="logo">
        <a href="/">
          <img src="{{ url_for('static', filename='img/Escudo-UNAM-white.svg') }}" alt="Logo UNAM" />
          <h1 class="alt-font">IntelliTutor UNAM</h1>
        </a>
      </div>

      <div class="menu">
        <div class="header-btns">
          <a href="{{ url_for('index') }}" class="btn alt-font">Inicio</a>
          <a href="{{ url_for('practicas') }}" class="btn alt-font">Prácticas</a>
          <a href="{{ url_for('evaluacion') }}" class="btn alt-font">Evaluación</a>
        </div>
        <div class="user-menu">
          <a href="{{ url_for('regis') }}" id="regis" class="btn alt-font">Registrarse</a>
          <a href="{{ url_for('login') }}" id="login" class="btn alt-font">Iniciar sesión</a>
        </div>
      </div>

      <div class="burger-menu">
        <i class="fas fa-bars"></i>
      </div>
    </header>

    <main id="register">
      <div id="form-container">
        <h2 class="alt-font">Registro</h2>
        <form action="{{ url_for('regis') }}" method="post" id="login-form">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form-input" required />
          </div>
          <div class="form-group">
            <label for="email">Correo electronico</label>
            <input type="email" id="email" name="email" class="form-input" required />
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="passwd-container">
              <input type="password" id="password" name="password" class="passwd-field form-input" required />
              <button type="button" id="togglePassword" class="toggle-btn">
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="password">Confirmar contraseña</label>
            <div class="passwd-container">
              <input
                type="password"
                id="password_confirmation"
                name="password_confirmation"
                class="passwd-field form-input"
                required />
              <button type="button" id="togglepassword_confirmation" class="toggle-btn">
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="alt-font form-btn">Crear Cuenta</button>
        </form>
      </div>
    </main>

    <script src="{{ url_for('static', filename='js/functions.js') }}"></script>
  </body>
</html>
